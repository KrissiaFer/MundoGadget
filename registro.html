<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Mundo Gadget</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="auth.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <h1 class="logo">Mundo Gadget</h1>
    <div class="icons">
      <a href="index.html" style="color: white; text-decoration: none;">🏠 Inicio</a>
    </div>
  </header>

  <!-- CONTENEDOR PRINCIPAL -->
  <main class="auth-container">
    <div class="auth-card">
      <h2 class="auth-title">Registro de Cliente</h2>
      <p class="auth-subtitle">Crea tu cuenta en Mundo Gadget</p>

      <!-- MENSAJES DE ERROR/ÉXITO -->
      <div id="messageContainer" class="message-container"></div>

      <!-- FORMULARIO DE REGISTRO -->
      <form id="registerForm" class="auth-form">
        
        <div class="form-group">
          <label for="nombre">Nombre *</label>
          <input 
            type="text" 
            id="nombre" 
            name="nombre" 
            required
            placeholder="Ingresa tu nombre"
          >
          <span class="error-message" id="nombreError"></span>
        </div>

        <div class="form-group">
          <label for="apellido">Apellido *</label>
          <input 
            type="text" 
            id="apellido" 
            name="apellido" 
            required
            placeholder="Ingresa tu apellido"
          >
          <span class="error-message" id="apellidoError"></span>
        </div>

        <div class="form-group">
          <label for="username">Nombre de Usuario *</label>
          <input 
            type="text" 
            id="username" 
            name="username" 
            required
            placeholder="Elige un nombre de usuario único"
          >
          <span class="error-message" id="usernameError"></span>
        </div>

        <div class="form-group">
          <label for="password">Contraseña *</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            required
            placeholder="Mínimo 6 caracteres"
          >
          <span class="error-message" id="passwordError"></span>
          <div class="password-requirements">
            <small>La contraseña debe contener:</small>
            <ul>
              <li id="req-length">✗ Mínimo 6 caracteres</li>
              <li id="req-uppercase">✗ Al menos 1 letra mayúscula</li>
              <li id="req-number">✗ Al menos 1 número</li>
              <li id="req-special">✗ Al menos 1 carácter especial (!@#$%^&*)</li>
            </ul>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmar Contraseña *</label>
          <input 
            type="password" 
            id="confirmPassword" 
            name="confirmPassword" 
            required
            placeholder="Repite tu contraseña"
          >
          <span class="error-message" id="confirmPasswordError"></span>
        </div>

        <div class="form-group">
          <label for="telefono">Teléfono *</label>
          <input 
            type="tel" 
            id="telefono" 
            name="telefono" 
            required
            placeholder="Ej: 7890-1234"
          >
          <span class="error-message" id="telefonoError"></span>
        </div>

        <div class="form-group">
          <label for="email">Correo Electrónico *</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            required
            placeholder="ejemplo@correo.com"
          >
          <span class="error-message" id="emailError"></span>
        </div>

        <button type="submit" class="auth-button">Registrarse</button>
      </form>

      <p class="auth-footer">
        ¿Ya tienes una cuenta? <a href="login.html">Inicia sesión aquí</a>
      </p>
    </div>
  </main>

  <script src="auth.js"></script>
  <script src="registro.js"></script>
</body>
</html>
