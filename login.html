<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión - Mundo Gadget</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header class="header">
      <h1 class="logo">Mundo Gadget</h1>
      <div class="icons">
        <a href="index.html" style="color: white; text-decoration: none"
          >🏠 Inicio</a
        >
      </div>
    </header>

    <!-- CONTENEDOR PRINCIPAL -->
    <main class="auth-container">
      <div class="auth-card">
        <h2 class="auth-title">Iniciar Sesión</h2>
        <p class="auth-subtitle">Accede a tu cuenta de Mundo Gadget</p>

        <!-- SELECTOR DE TIPO DE USUARIO -->
        <div class="user-type-selector">
          <button
            type="button"
            id="btnCliente"
            class="user-type-btn active"
            data-type="cliente"
          >
            👤 Cliente
          </button>
          <button
            type="button"
            id="btnAdmin"
            class="user-type-btn"
            data-type="admin"
          >
            🔑 Administrador
          </button>
        </div>

        <!-- MENSAJES DE ERROR/ÉXITO -->
        <div id="messageContainer" class="message-container"></div>

        <!-- FORMULARIO DE LOGIN -->
        <form id="loginForm" class="auth-form">
          <div class="form-group">
            <label for="username">Nombre de Usuario *</label>
            <input
              type="text"
              id="username"
              name="username"
              required
              placeholder="Ingresa tu usuario"
            />
            <span class="error-message" id="usernameError"></span>
          </div>

          <div class="form-group">
            <label for="password">Contraseña *</label>
            <input
              type="password"
              id="password"
              name="password"
              required
              placeholder="Ingresa tu contraseña"
            />
            <span class="error-message" id="passwordError"></span>
          </div>

          <button type="submit" class="auth-button">Iniciar Sesión</button>
        </form>

        <p class="auth-footer">
          ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
        </p>

        <!-- INFORMACIÓN PARA ADMIN (solo visible en desarrollo) -->
        <div class="admin-info">
          <small
            ><strong>Credenciales de administrador por defecto:</strong></small
          ><br />
          <small
            >Usuario: <code>admin</code> | Contraseña:
            <code>Admin123!</code></small
          >
        </div>
      </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
