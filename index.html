<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Mundo Gadget</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/styles_cart.css" />
    <link rel="stylesheet" href="css/styles_notifications.css" />
  </head>

  <body>
    <!-- HEADER -->
    <header class="header">
      <h1 class="logo">Mundo Gadget</h1>

      <input
        type="text"
        id="searchInput"
        placeholder="Buscar productos..."
        class="search"
      />

      <div class="icons">
        <span id="cart-btn" style="cursor: pointer; position: relative">
          🛒
          <span
            id="cart-count"
            style="
              background: red;
              color: white;
              border-radius: 50%;
              padding: 2px 6px;
              font-size: 12px;
              position: absolute;
              top: -10px;
              right: -10px;
            "
            >0</span
          >
        </span>
        <a
          href="login.html"
          style="color: white; text-decoration: none; margin-left: 15px"
          >👤 Ingresar</a
        >
        <a
          href="registro.html"
          style="color: white; text-decoration: none; margin-left: 15px"
          >📝 Registro</a
        >
      </div>
    </header>

    <!-- NAV FILTROS -->
    <div class="nav">
      <span data-filter="all">Todos</span>
      <span data-filter="monitor">Monitores</span>
      <span data-filter="laptop">Laptops</span>
      <span data-filter="audio">Audio</span>
      <span data-filter="ofertas">Ofertas</span>
    </div>

    <!-- PRODUCTOS -->
    <main class="products-container" id="productsContainer"></main>

    <!-- MODAL CARRITO (Agregado por RR) -->
    <div id="cart-modal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Carrito de Compras</h2>
        <div id="cart-items-container"></div>
        <div class="cart-footer">
          <h3>Total: $<span id="cart-total">0.00</span></h3>
          <button
            id="clear-cart-btn"
            style="
              background-color: #f44336;
              color: white;
              padding: 10px;
              border: none;
              border-radius: 4px;
              cursor: pointer;
              margin-right: 10px;
            "
          >
            Vaciar Carrito
          </button>
          <button id="checkout-btn" class="btn-checkout">
            Generar Factura
          </button>
        </div>
      </div>
    </div>

    <!-- MODAL FACTURA (Agregado por RR) -->
    <div id="invoice-modal" class="modal">
      <div class="modal-content">
        <!-- datos de envio -->
        <div style="margin-top: 15px; text-align: left">
          <h3>Datos de envío</h3>
          <label>Dirección</label>
          <input
            type="text"
            id="direccion"
            placeholder="Ej. San Salvador, Col. Escalón"
            style="width: 100%; padding: 8px; margin-bottom: 10px"
          />
          <label>Teléfono</label>
          <input
            type="text"
            id="telefono"
            placeholder="Ej. 7777-7777"
            style="width: 100%; padding: 8px"
          />
        </div>
        <span class="close" id="invoice-close">&times;</span>
        <div id="invoice-content"></div>
        <div style="text-align: center; margin-top: 20px">
          <button id="confirm-purchase-btn" onclick="myCart.confirmarCompra()">
            Confirmar compra
          </button>
          <button
            id="back-to-cart-btn"
            style="padding: 10px; margin-left: 10px"
          >
            Volver
          </button>
        </div>
      </div>
    </div>

    <!-- Notification Container (Agregado por RR) -->
    <div id="notification-container"></div>

    <!-- Scripts del carrito y notificaciones (Agregado por RR) -->
    <script src="js/cart.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
